services:
  monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.slim
    image: availability-monitor-example:local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-900}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-21600}
      APP_DATA_DIR: /data
      MONITOR_CMD: python /app/monitor.py --data-dir /data
    volumes:
      - monitor_state:/data

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.slim
    image: availability-monitor-example:local
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "webapp:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      APP_DATA_DIR: /data
      WEB_UI_PASSWORD: ${WEB_UI_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-set-session-secret}
    volumes:
      - monitor_state:/data

volumes:
  monitor_state:
